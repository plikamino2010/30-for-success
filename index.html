<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7755BB" />
    <meta name="description" content="Wait 30 - แอปช่วยลดการซื้อของตามอารมณ์ ด้วยการรอคิดก่อนซื้อ" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet" />
    <title>Wait 30 - รอก่อนซื้อ</title>
  </head>
  <body>
    <!-- Watercolor wash blobs -->
    <div aria-hidden="true" style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden">
      <div style="position:absolute;width:520px;height:520px;top:-140px;left:-160px;border-radius:60% 40% 55% 45%;background:radial-gradient(circle,rgba(251,194,130,0.28),transparent 70%);filter:blur(55px)"></div>
      <div style="position:absolute;width:480px;height:480px;top:-80px;right:-160px;border-radius:45% 55% 40% 60%;background:radial-gradient(circle,rgba(180,160,240,0.28),transparent 70%);filter:blur(55px)"></div>
      <div style="position:absolute;width:380px;height:380px;bottom:-80px;left:20%;border-radius:55% 45% 60% 40%;background:radial-gradient(circle,rgba(120,210,160,0.22),transparent 70%);filter:blur(50px)"></div>
      <div style="position:absolute;width:320px;height:320px;bottom:60px;right:-80px;border-radius:40% 60% 45% 55%;background:radial-gradient(circle,rgba(245,160,160,0.22),transparent 70%);filter:blur(45px)"></div>
    </div>
    <div id="root" style="position:relative;z-index:1"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
